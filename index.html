.row { display: flex; align-items: center; margin-bottom: 15px; }
.row label { width: 80px; font-weight: bold; color: #425152; }
.row input { flex: 1; padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; }
button { padding: 6px 10px; background: black; color: #ffffff; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; align-self: flex-start; }
button:hover { background: #333; }
#error-message { color: red; margin-top: 10px; font-size: 14px; }
p.copy { margin-top: 15px; font-size: 11px; color: #666; }
</style>

<iframe id="iframe-content" src=""> </iframe>
<div id="blocker"></div>

    </div>

    <div class="row">
      <label for="password">Password :</label>
      <input type="password" id="password" placeholder="Enter password" required autofocus>
    </div>

    <button type="submit" id="submitBtn">Login</button>
    <div id="error-message"></div>
  </form>

  <p class="copy">
    All rights reserved. Copyright ©️ 2026
    <span id="copy-name">Company</span>
  </p>
</div>
